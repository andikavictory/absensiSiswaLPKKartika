<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi Siswa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
   
    <h2>Absensi Latihan Mengemudi</h2>

    <!--DATA SISWA-->
    <div id="dataSiswa">
        <p><b>Nama :</b><span id="namaSiswa"></span></p> 
        <p><b>Paket :</b><span id="paket"></span></p> 
        <p><b>jenis Mobil :</b><span id="jenisMobil"></span></p> 
        <p><b>Instruktur :</b><span id="instruktur"></span></p> 
        <p><b>Pertemuan :</b><span id="pertemuan"></span></p> 
        </div>

        <hr>

        <!--LIST MATERI-->
        <h3>LIST MATERI</h3>
        <div id="listMateri">
            <!-- Materi akan ditambahkan di sini -->
        </div>

        <hr>

        <!--TUKAR MATERI-->
        <H3>TUKAR MATERI</H3>
        <button id="tukarMateri">Tukar Materi</button>
        <div id="areaTukarMateri" style="display:none">Tukar Materi
            <p>Pilih materi dari pertemuan :</p>

            <select id="pilihPertemuan">
                <option value="1">Pertemuan 1</option>
                <option value="2">Pertemuan 2</option>
                <option value="3">Pertemuan 3</option>
                <option value="4">Pertemuan 4</option>
                <option value="5">Pertemuan 5</option>
                <option value="6">Pertemuan 6</option>
                <option value="7">Pertemuan 7</option>
                <option value="8">Pertemuan 8</option>
                <option value="9">Pertemuan 9</option>
                <option value="10">Pertemuan 10</option>
                <option value="11">Pertemuan 11</option>
                <option value="12">Pertemuan 12</option>
            </select>
        </div>
        <br>

        <!--ALASAN TUKAR-->
        <div id="areaAlasan" style="display: none;">
            <p>Alasan tukar materi</p>
            <input type="text" id="alasanTukar" placeholder="contoh : hujan deras">
        </div>

        <hr>

        <!--KELUHAN-->

        <h3>Keluhan (Optional)</h3>

        <textarea id="keluhan" rows="3"></textarea>
        <hr>

        <!--TOMBOL SIMPAN-->
        <button id="btnSimpan">Simpan Absensi</button>
        <script src="js/dashboard.js"></script>
        <script src="js/database.js"></script>
        <script src="js/materi.js"></script>
        <script src="js/absensi.js"></script>

</body>
</html>
