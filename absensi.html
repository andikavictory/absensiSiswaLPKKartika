<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi</title>
</head>
<body>
    <h2>Form Absensi</h2>
    <p id="status"></p>

    <label>Materi hari ini : </label><br>
    <input type="text" name="" id="materi">

    <br><br>

    <label>Keluhan : </label><br>
    <textarea name="" id="keluhan"></textarea>

    <br><br>

    <button onclick="kirimAbsensi()">Kirim Absensi</button>

    <script>
        let cekQR = localStorage.getItem("qrValid")

        if(!cekQR){
            alert("QR Code tidak valid, silahkan scan ulang")
            window.location.href = "scan.html"
        }

        function kirimAbsensi(){
            alert("Absensi berhasil dikirim, terima kasih!")
            localStorage.removeItem("qrValid") 
            window.location.href = "dashboard.html"
        }
    </script>
</body>
</html>
